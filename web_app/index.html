<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Push-up AI Trainer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      gap: 12px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f5a623;
      letter-spacing: 0.04em;
      align-self: flex-start;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      width: 100%;
      max-width: 960px;
      justify-content: center;
    }

    .video-wrap {
      flex: 1 1 340px;
      max-width: 560px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    .stats {
      flex: 1 1 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #status {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
      background: #2a2a2a;
      color: #bbb;
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    #status.waiting { background: #2a2200; color: #f5c842; }
    #status.ready   { background: #0d2a12; color: #4cde7a; }

    .rep-row { display: flex; gap: 10px; }

    .rep-card {
      flex: 1;
      background: #1e1e1e;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .rep-card .label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #777;
      margin-bottom: 4px;
    }
    .rep-card .value { font-size: 2.4rem; font-weight: 700; line-height: 1; }
    .rep-card.good .value { color: #4cde7a; }
    .rep-card.bad  .value { color: #ff5c5c; }

    .detail-row {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 9px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
    }
    .detail-row .key { color: #777; }
    .detail-row .val { font-weight: 600; color: #f0f0f0; }

    #form-feedback {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.85rem;
      line-height: 1.6;
      min-height: 54px;
      color: #aaa;
    }
    #form-feedback .good  { color: #4cde7a; font-weight: 600; }
    #form-feedback .warn  { color: #f5a623; font-weight: 600; }
    #form-feedback .bad   { color: #ff5c5c; font-weight: 600; }

    .btn-row { display: flex; gap: 10px; }

    button {
      flex: 1;
      padding: 12px 0;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: default; }
    #start-btn { background: #f5a623; color: #111; }
    #reset-btn { background: #2a2a2a; color: #ccc; }
  </style>

  <!-- MediaPipe Pose — must load before our script -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
</head>
<body>

<h1>Push-up AI Trainer</h1>

<div class="container">
  <div class="video-wrap">
    <video id="video" playsinline muted></video>
  </div>

  <div class="stats">
    <div id="status">Click Start to begin</div>

    <div class="rep-row">
      <div class="rep-card good">
        <div class="label">Good Reps</div>
        <div class="value" id="good-reps">0</div>
      </div>
      <div class="rep-card bad">
        <div class="label">Bad Reps</div>
        <div class="value" id="bad-reps">0</div>
      </div>
    </div>

    <div class="detail-row">
      <span class="key">Elbow angle</span>
      <span class="val" id="elbow-angle">--</span>
    </div>
    <div class="detail-row">
      <span class="key">Phase</span>
      <span class="val" id="phase">--</span>
    </div>
    <div class="detail-row">
      <span class="key">Anomaly score</span>
      <span class="val" id="anomaly-score">--</span>
    </div>

    <div id="form-feedback">Form feedback will appear here after each rep.</div>

    <div class="btn-row">
      <button id="start-btn">Start Camera</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  ANGLE HEURISTICS
// ═══════════════════════════════════════════════════════════════

function angle3Points(A, B, C) {
  const AB = { x: A.x - B.x, y: A.y - B.y };
  const CB = { x: C.x - B.x, y: C.y - B.y };
  const dot = AB.x * CB.x + AB.y * CB.y;
  const magAB = Math.hypot(AB.x, AB.y);
  const magCB = Math.hypot(CB.x, CB.y);
  if (magAB === 0 || magCB === 0) return null;
  return Math.acos(Math.max(-1, Math.min(1, dot / (magAB * magCB)))) * (180 / Math.PI);
}

function lmVis(lm, idx, threshold = 0.25) {
  // Lowered threshold from 0.3 to 0.25 to be more tolerant of partial visibility
  return lm[idx] && (lm[idx].visibility ?? 1) >= threshold;
}

// ── getBestSide ───────────────────────────────────────────────
// Returns the side with better landmark visibility
function getBestSide(lm) {
  const lScore = (lm[11]?.visibility??0)+(lm[13]?.visibility??0)+(lm[15]?.visibility??0);
  const rScore = (lm[12]?.visibility??0)+(lm[14]?.visibility??0)+(lm[16]?.visibility??0);
  return lScore >= rScore ? 'left' : 'right';
}

// ── isInPushupPosition ────────────────────────────────────────
// More lenient: accepts a wider elbow angle range and is tolerant
// of camera angles and partial visibility
function isInPushupPosition(lm) {
  const leftOk  = lmVis(lm,11,0.2) && lmVis(lm,13,0.2) && lmVis(lm,15,0.2);
  const rightOk = lmVis(lm,12,0.2) && lmVis(lm,14,0.2) && lmVis(lm,16,0.2);
  if (!leftOk && !rightOk) return false;

  const s = getBestSide(lm);
  const shoulder = s==='left' ? lm[11] : lm[12];
  const elbow    = s==='left' ? lm[13] : lm[14];
  const wrist    = s==='left' ? lm[15] : lm[16];

  const ea = angle3Points(shoulder, elbow, wrist);
  if (ea === null) return false;

  // WIDENED range: 40° (very deep) to 180° (full lockout including straight arm start)
  if (ea < 40 || ea > 180) return false;

  // Wrist must not be way above the shoulder — more lenient at ±0.50
  if (wrist.y - shoulder.y < -0.50) return false;

  return true;
}

// ── analyzeFrame ──────────────────────────────────────────────
// Returns issues with SEVERITY classifications.
// HIGH severity = truly bad form (both high-severity issues needed to mark bad rep)
// MEDIUM = coaching tip shown but doesn't make it a "bad" rep alone
// LOW = minor tip, always shown in feedback
function analyzeFrame(lm) {
  const s = getBestSide(lm);

  const shoulder = s==='left' ? lm[11] : lm[12];
  const elbow    = s==='left' ? lm[13] : lm[14];
  const wrist    = s==='left' ? lm[15] : lm[16];
  const hip      = s==='left' ? lm[23] : lm[24];
  const knee     = s==='left' ? lm[25] : lm[26];
  const ankle    = s==='left' ? lm[27] : lm[28];
  const ear      = s==='left' ? lm[7]  : lm[8];

  const armIdx = s==='left' ? [11,13,15] : [12,14,16];
  if (!armIdx.every(i => lmVis(lm, i, 0.2))) {
    return { elbowAngle: null, issues: [], isGoodForm: true };
  }

  const elbowAngle = angle3Points(shoulder, elbow, wrist);
  if (elbowAngle === null) return { elbowAngle: null, issues: [], isGoodForm: true };

  const issues = [];

  const hipVis   = lmVis(lm, s==='left'?23:24, 0.2);
  const ankleVis = lmVis(lm, s==='left'?27:28, 0.2);
  const kneeVis  = lmVis(lm, s==='left'?25:26, 0.2);

  const backAngle = (hipVis && ankleVis) ? angle3Points(shoulder, hip, ankle) : null;
  const kneeAngle = (hipVis && kneeVis && ankleVis) ? angle3Points(hip, knee, ankle) : null;

  // ── Body alignment ─────────────────────────────────────────
  // Only flag hip sag/raise if it's really pronounced (was <145, now <130)
  if (backAngle !== null && backAngle < 130) {
    const midY = ankle ? (shoulder.y + ankle.y) / 2 : shoulder.y;
    if (hip.y > midY + 0.08) {
      // More lenient threshold: was 0.04, now 0.08
      issues.push({ code:'HIP_SAG', message:'Hips sagging — squeeze core and glutes', severity:'high' });
    } else if (hip.y < midY - 0.10) {
      // More lenient: was -0.06, now -0.10
      issues.push({ code:'HIP_RAISED', message:'Hips too high (pike) — lower hips for a straight plank', severity:'high' });
    }
  }

  // ── Elbow flare ────────────────────────────────────────────
  // More lenient: was 0.12, now 0.18
  const expX = (shoulder.x + wrist.x) / 2;
  if (Math.abs(elbow.x - expX) > 0.18) {
    issues.push({ code:'ELBOW_FLARE', message:'Elbows flaring — try tucking elbows ~45° toward torso', severity:'medium' });
  }

  // ── Bent knees ─────────────────────────────────────────────
  // More lenient: was <150, now <130
  if (kneeAngle !== null && kneeAngle < 130) {
    issues.push({ code:'BENT_KNEES', message:'Legs slightly bent — try to extend your knees', severity:'low' });
  }

  // ── Head/neck ──────────────────────────────────────────────
  const earIdx = s==='left'?7:8;
  if (lmVis(lm, earIdx, 0.2) && hipVis) {
    const na = angle3Points(ear, shoulder, hip);
    if (na !== null && na < 130) {
      // More lenient: was 140, now 130
      if (ear.y < shoulder.y - 0.14)
        issues.push({ code:'HEAD_UP', message:'Head craning up — keep neck neutral', severity:'low' });
      else if (ear.y > shoulder.y + 0.10)
        issues.push({ code:'HEAD_DOWN', message:'Chin tucking a bit — try neutral neck position', severity:'low' });
    }
  }

  // ── Lumbar sag ─────────────────────────────────────────────
  // More lenient: was 0.07, now 0.12
  if (backAngle !== null && ankleVis) {
    const dX = ankle.x - shoulder.x;
    if (Math.abs(dX) > 0.01) {
      const t = (hip.x - shoulder.x) / dX;
      const lineY = shoulder.y + t * (ankle.y - shoulder.y);
      if (hip.y - lineY > 0.12) {
        issues.push({ code:'LOWER_BACK_SAG', message:'Lower back sagging — engage abs and glutes', severity:'high' });
      }
    }
  }

  // Count high-severity issues
  const highCount = issues.filter(i => i.severity === 'high').length;

  // CHANGED: Only mark as "not good form" if 2+ high severity issues occur
  // (was: any high severity issue = bad form)
  return {
    elbowAngle,
    issues,
    isGoodForm: highCount < 2
  };
}

function getPhase(angle) {
  if (angle === null) return 'UNKNOWN';
  if (angle > 145) return 'UP';   // Was 155 — more lenient top threshold
  if (angle < 100) return 'DOWN'; // Was 90 — catch descent earlier
  return 'MOVING';
}

// ═══════════════════════════════════════════════════════════════
//  REP COUNTER
// ═══════════════════════════════════════════════════════════════

const PHASE_CONFIRM_FRAMES    = 3;   // Was 4 — react faster
const MIN_DEPTH_ANGLE         = 115; // Was 100 — more lenient depth requirement
const EMA_ALPHA               = 0.35; // Was 0.30 — slightly more responsive
const POSITION_CONFIRM_FRAMES = 10;  // Was 15 — get ready faster
// How many HIGH severity issues during a rep to call it truly "bad"
const BAD_REP_HIGH_THRESHOLD  = 2;
// Anomaly score must exceed this AND have high issues to mark bad rep
const ANOMALY_BAD_THRESHOLD   = 0.12; // Was implicit in model; now explicit gate

class RepCounter {
  constructor() { this.reset(); }

  reset() {
    this.phase        = 'UP';
    this.pendingPhase = 'UP';
    this.pendingCount = 0;

    this.goodReps = 0;
    this.badReps  = 0;

    this._repIssues       = [];
    this._highIssueCount  = 0;
    this._minElbow        = 180;
    this._smoothedAngle   = null;
    this._inPosFr         = 0;
    this.isReady          = false;
  }

  update(elbowAngle, isGoodForm, issues, inPosition, anomalyScore) {
    // Position gating
    if (!inPosition || elbowAngle === null) {
      this._inPosFr = Math.max(0, this._inPosFr - 2); // Was -3, slower dropout
      if (this._inPosFr === 0) this.isReady = false;
      return null;
    }
    this._inPosFr = Math.min(this._inPosFr + 1, POSITION_CONFIRM_FRAMES);
    if (this._inPosFr >= POSITION_CONFIRM_FRAMES) this.isReady = true;
    if (!this.isReady) return null;

    // Smooth angle
    this._smoothedAngle = this._smoothedAngle === null
      ? elbowAngle
      : EMA_ALPHA * elbowAngle + (1 - EMA_ALPHA) * this._smoothedAngle;
    const angle = this._smoothedAngle;

    // Track min depth
    if (angle < this._minElbow) this._minElbow = angle;

    // Accumulate issues — track high-severity count separately
    for (const issue of issues) {
      if (!this._repIssues.find(i => i.code === issue.code)) {
        this._repIssues.push(issue);
        if (issue.severity === 'high') this._highIssueCount++;
      }
    }

    // Phase candidate
    const raw = getPhase(angle);
    const candidate = raw === 'UP' ? 'UP' : raw === 'DOWN' ? 'DOWN' : this.phase;

    if (candidate !== this.pendingPhase) {
      this.pendingPhase = candidate;
      this.pendingCount = 1;
    } else {
      this.pendingCount++;
    }

    let event = null;
    if (this.pendingCount >= PHASE_CONFIRM_FRAMES && candidate !== this.phase) {
      const prev = this.phase;
      this.phase = candidate;

      if (prev === 'UP' && this.phase === 'DOWN') {
        // Rep starting — reset trackers
        this._repIssues      = [];
        this._highIssueCount = 0;
        this._minElbow       = 180;
      }
      if (prev === 'DOWN' && this.phase === 'UP') {
        event = this._finalize(anomalyScore);
      }
    }
    return event;
  }

  _finalize(anomalyScore) {
    const allIssues = [...this._repIssues];
    let isShallow = false;

    // Shallow rep warning — but more lenient (115° instead of 100°)
    if (this._minElbow > MIN_DEPTH_ANGLE) {
      isShallow = true;
      allIssues.push({
        code: 'SHALLOW_REP',
        message: `Try to go a bit deeper — you reached ~${Math.round(this._minElbow)}°, aim for ~90–100°`,
        severity: 'medium' // Was 'high' — now medium so it doesn't auto-fail
      });
    }

    // Count high-severity issues accumulated during this rep
    const highCount = allIssues.filter(i => i.severity === 'high').length;

    // Anomaly flag (only counts if score is truly high)
    const anomalyBad = anomalyScore !== null && anomalyScore > ANOMALY_BAD_THRESHOLD;

    // BAD REP only if: 2+ high severity issues AND (anomaly is bad OR issues are truly severe)
    // Otherwise it's a GOOD REP with tips shown
    let event;
    if (highCount >= BAD_REP_HIGH_THRESHOLD && anomalyBad) {
      this.badReps++;
      event = { type: 'BAD_REP', issues: allIssues };
    } else if (highCount >= 3) {
      // Even without anomaly, 3+ high issues = bad rep
      this.badReps++;
      event = { type: 'BAD_REP', issues: allIssues };
    } else {
      this.goodReps++;
      // GOOD REP but still show any tips/warnings
      event = { type: 'GOOD_REP', issues: allIssues };
    }

    this._repIssues      = [];
    this._highIssueCount = 0;
    this._minElbow       = 180;
    return event;
  }

  get smoothedAngle() { return this._smoothedAngle; }
}

// ═══════════════════════════════════════════════════════════════
//  GRU ANOMALY MODEL
// ═══════════════════════════════════════════════════════════════

const KEYPOINT_INDICES = [11,12,13,14,15,16,23,24,25,26,27,28,0,7,8,9,10];

class PushupModel {
  constructor() {
    this.model     = null;
    this.buffer    = [];
    this.SEQ_LEN   = 30;
    this.FEATURES  = 68;
    this.THRESHOLD = 0.12; // Raised from 0.08 — less trigger-happy
  }

  async load() {
    try {
      this.model = await tf.loadLayersModel('/models/gru_model/model.json');
      console.log('✅ GRU model loaded');
    } catch (e) {
      console.warn('⚠️ GRU model unavailable — anomaly detection disabled');
      this.model = null;
    }
  }

  addFrame(frame) {
    if (frame.length !== this.FEATURES) return;
    this.buffer.push(frame);
    if (this.buffer.length > this.SEQ_LEN) this.buffer.shift();
  }

  clearBuffer() { this.buffer = []; }

  async getScore() {
    if (!this.model || this.buffer.length < this.SEQ_LEN) return null;
    let inp = null, out = null;
    try {
      inp = tf.tensor([this.buffer]);
      out = this.model.predict(inp);
      const pred = await out.array();
      let err = 0;
      for (let t = 0; t < this.SEQ_LEN; t++)
        for (let f = 0; f < this.FEATURES; f++) {
          const d = this.buffer[t][f] - pred[0][t][f];
          err += d * d;
        }
      err /= (this.SEQ_LEN * this.FEATURES);
      return err; // raw score
    } catch(e) {
      return null;
    } finally {
      if (inp) inp.dispose();
      if (out) out.dispose();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════════

const ANOMALY_INTERVAL = 10;

let repCounter  = null;
let gruModel    = null;
let frameCount  = 0;
let lastAnomaly = null; // raw score number or null
let appRunning  = false;

const elGoodReps  = () => document.getElementById('good-reps');
const elBadReps   = () => document.getElementById('bad-reps');
const elElbow     = () => document.getElementById('elbow-angle');
const elPhaseEl   = () => document.getElementById('phase');
const elAnomalyEl = () => document.getElementById('anomaly-score');
const elFeedback  = () => document.getElementById('form-feedback');
const elStatusEl  = () => document.getElementById('status');

async function startApp() {
  if (appRunning) return;

  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = 'Starting…';
  setStatus('⏳ Requesting camera…', '');

  const video = document.getElementById('video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    video.srcObject = stream;
    await video.play();
  } catch(e) {
    alert('Camera access denied. Please allow camera permissions and reload.');
    btn.disabled = false;
    btn.textContent = 'Start Camera';
    setStatus('❌ Camera access denied', '');
    return;
  }

  repCounter  = new RepCounter();
  frameCount  = 0;
  lastAnomaly = null;

  gruModel = new PushupModel();
  await gruModel.load();

  const pose = new window.Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    minDetectionConfidence: 0.45, // Was 0.5 — more tolerant
    minTrackingConfidence:  0.45
  });
  pose.onResults(onResults);

  appRunning = true;
  btn.textContent = 'Running';
  setStatus('📍 Get into push-up position', 'waiting');

  async function loop() {
    if (!appRunning) return;
    await pose.send({ image: video });
    requestAnimationFrame(loop);
  }
  loop();
}

async function onResults(results) {
  if (!results.poseLandmarks) return;
  const lm = results.poseLandmarks;
  frameCount++;

  const inPosition = isInPushupPosition(lm);
  const analysis   = analyzeFrame(lm);

  if (inPosition && analysis.elbowAngle !== null) {
    const fd = KEYPOINT_INDICES.flatMap(i => [
      lm[i]?.x ?? 0, lm[i]?.y ?? 0, lm[i]?.z ?? 0, lm[i]?.visibility ?? 0
    ]);
    gruModel.addFrame(fd);
    if (frameCount % ANOMALY_INTERVAL === 0) {
      lastAnomaly = await gruModel.getScore(); // raw score now
    }
  } else {
    gruModel.clearBuffer();
    lastAnomaly = null;
  }

  const repEvent = repCounter.update(
    analysis.elbowAngle,
    analysis.isGoodForm,
    analysis.issues,
    inPosition,
    lastAnomaly // pass raw score
  );

  updateUI(analysis, repEvent, inPosition);
}

function updateUI(analysis, repEvent, inPosition) {
  if (!repCounter) return;

  elGoodReps().textContent = repCounter.goodReps;
  elBadReps().textContent  = repCounter.badReps;

  const displayAngle = repCounter.smoothedAngle ?? analysis.elbowAngle;
  elElbow().textContent = displayAngle !== null ? Math.round(displayAngle) + '°' : '--';

  if (!inPosition) {
    elPhaseEl().textContent = 'NOT IN POSITION';
    setStatus('📍 Get into push-up position', 'waiting');
  } else if (!repCounter.isReady) {
    elPhaseEl().textContent = 'GET READY…';
    setStatus('⏳ Hold position… getting ready', 'waiting');
  } else {
    elPhaseEl().textContent = repCounter.phase;
    setStatus('🟢 Counting — go!', 'ready');
  }

  elAnomalyEl().textContent = lastAnomaly !== null ? lastAnomaly.toFixed(4) : '--';

  if (repEvent) {
    const fb = elFeedback();
    if (repEvent.type === 'GOOD_REP') {
      const tips = (repEvent.issues || [])
        .filter(i => i.severity !== 'low' || repEvent.issues.length <= 2)
        .sort((a,b) => rank(b.severity) - rank(a.severity))
        .slice(0, 3);

      if (tips.length === 0) {
        fb.innerHTML = '<span class="good">✓ Perfect rep! Great form!</span>';
      } else {
        const tipHtml = tips.map(i =>
          `• <span class="${i.severity === 'high' ? 'warn' : ''}">${i.message}</span>`
        ).join('<br>');
        fb.innerHTML = `<span class="good">✓ Good rep!</span> A few tips:<br>${tipHtml}`;
      }
    } else {
      // BAD REP
      const top = (repEvent.issues || [])
        .sort((a,b) => rank(b.severity) - rank(a.severity))
        .slice(0, 3)
        .map(i => `• ${i.message}`)
        .join('<br>');
      fb.innerHTML = `<span class="bad">✗ Rep needs improvement:</span><br>${top}`;
    }
  }
}

function setStatus(text, cls) {
  const el = elStatusEl();
  el.textContent = text;
  el.className = cls;
}

function rank(s) { return {high:3,medium:2,low:1}[s]??0; }
